# Codemagic CI — PRESI iOS (Capacitor + Next.js web en Render)
# Docs: https://docs.codemagic.io/yaml/yaml-getting-started/
#
# Requisitos en Codemagic UI:
# 1) Integración App Store Connect (API Key) llamada exactamente: codemagic
# 2) Variable de entorno CAPACITOR_SERVER_URL = https://TU-APP.onrender.com
#    (sin barra final). PRESI es SSR; el IPA carga esa URL en el WebView.
# 3) Bundle ID en App Store Connect / Play Console = lat.presi.app (debe coincidir)

workflows:
  ios-workflow:
    name: PRESI iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: lat.presi.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Define esto en Codemagic → Environment variables (o un Environment group):
        # CAPACITOR_SERVER_URL: https://tu-app.onrender.com
      node: 20
      xcode: latest
    scripts:
      - name: Check CAPACITOR_SERVER_URL
        script: |
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "Missing CAPACITOR_SERVER_URL (e.g. https://your-app.onrender.com)"
            exit 1
          fi
          echo "Using CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL"
      - name: Install npm dependencies
        script: npm ci
      - name: Ensure Capacitor webDir exists
        script: |
          mkdir -p out
          if [ ! -f out/index.html ]; then
            printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"/><title>PRESI</title></head><body>PRESI</body></html>' > out/index.html
          fi
      - name: Sync Capacitor iOS (points WebView at Render)
        script: npx cap sync ios
      - name: Set up code signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Submit manually from App Store Connect until you're ready for auto-submit:
        submit_to_testflight: false
        submit_to_app_store: false
